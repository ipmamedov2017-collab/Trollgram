<!DOCTYPE html>
<html lang="ru">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        body{background:#1a1a2e;height:100vh;display:flex;align-items:center;justify-content:center;padding:8px;position:fixed;width:100%}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes recording{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.7}}
        
        .app{width:100%;height:100%;max-width:900px;background:#fff;border-radius:28px;overflow:hidden;display:flex;box-shadow:0 25px 50px rgba(0,0,0,0.3)}
        .sidebar{width:100%;background:#fff;display:flex;flex-direction:column}
        .main-area{width:100%;background:#f8fafd;display:flex;flex-direction:column;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:10;transform:translateX(100%);transition:transform 0.3s}
        .main-area.active{transform:translateX(0)}
        @media(min-width:768px){.sidebar{width:340px;border-right:1px solid #e0e0e0}.main-area{position:relative;transform:none;width:auto;flex:1}.back-btn{display:none!important}}

        .user-info p{font-size:12px;color:#667eea}
        .actions{display:flex;gap:6px}
        .icon-btn{width:42px;height:42px;border-radius:12px;border:none;background:transparent;color:#667eea;font-size:18px;cursor:pointer}
        .icon-btn:hover{background:#f0f4ff}
        
        .search{padding:14px 18px}
        .search input{width:100%;padding:14px 18px;background:#f4f7fc;border:1px solid #e8edf2;border-radius:16px;font-size:15px;outline:none}
        .chats-list{flex:1;overflow-y:auto;padding:8px 12px}
        .chat-item{display:flex;align-items:center;padding:14px;border-radius:18px;cursor:pointer;margin-bottom:4px}
        .chat-item:hover{background:#f4f7fc}
        .chat-avatar{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:18px;margin-right:14px;flex-shrink:0}
        .chat-content{flex:1;min-width:0}
        .chat-name{font-weight:600;font-size:15px;color:#1a1a2e;margin-bottom:3px}
        .chat-last{font-size:13px;color:#8e98a3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .badge{background:#ff3b30;color:#fff;border-radius:12px;padding:2px 8px;font-size:11px;margin-left:8px}
        
        .chat-header{padding:14px 20px;border-bottom:1px solid #e8edf2;display:flex;align-items:center;gap:14px;background:#fff}
        .back-btn{width:42px;height:42px;border-radius:12px;border:none;background:transparent;color:#667eea;font-size:20px;cursor:pointer}
        .chat-info{flex:1;cursor:pointer}
        .chat-info h3{font-size:17px;font-weight:700;color:#1a1a2e}
        .chat-info p{font-size:13px;color:#667eea}
        .online-dot{width:8px;height:8px;background:#34c759;border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 1.5s infinite}
        
        .messages-container{flex:1;overflow-y:auto;padding:20px;background:#f8fafd;display:flex;flex-direction:column;gap:10px}
        .message{display:flex;animation:fadeIn 0.3s;position:relative}

        .admin-header{padding:18px 22px;background:#1a1a2e;display:flex;justify-content:space-between}
        .admin-tabs{display:flex;padding:14px 18px;gap:10px;overflow-x:auto}

        .admin-item{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.08);align-items:center;flex-wrap:wrap;gap:10px}
        .admin-btn{padding:8px 16px;border-radius:14px;border:none;font-weight:600;cursor:pointer}
        .admin-btn-primary{background:#667eea;color:#fff}
        .admin-btn-danger{background:#ff3b30;color:#fff}
        .admin-btn-success{background:#34c759;color:#fff}
        .admin-btn-warning{background:#ff9500;color:#fff}
        
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:14px 24px;border-radius:40px;z-index:1000}
        .group-avatar{background:linear-gradient(135deg,#34c759,#28a745)!important}
        audio, img, video{max-width:200px;border-radius:12px;margin-top:8px}
    </style>
</head>

<script>
// ========== FIREBASE ==========
const firebaseConfig = {
    apiKey: "AIzaSyCf1UO6hrlYXR2GYcgGZUfsbit4Zav1m4E",
    authDomain: "trolldonor.firebaseapp.com",
    databaseURL: "https://trolldonor-default-rtdb.firebaseio.com",
    projectId: "trolldonor",
    storageBucket: "trolldonor.firebasestorage.app",
    appId: "1:761197257675:web:53dc596cf349d0cd474c4e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ========== ПЕРЕМЕННЫЕ ==========
let MAX = 50;
let currentUser = null;
let currentChat = null;
let selectedUsers = new Set();
let adminClicks = 0;
let adminTimer = null;
let pendingMedia = null;
let messagesListener = null;
let selectedMessageId = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

const state = { users: {}, chats: {}, userChats: {} };
const ADMIN_PASS = "90365353??";

function $(id) { return document.getElementById(id); }

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function formatTime(ts) {
    return ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// ========== УВЕДОМЛЕНИЯ (РАБОТАЮТ В WEB2APP) ==========
async function requestNotificationPermission() {
    if ('Notification' in window) {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            console.log('✅ Уведомления разрешены');
            showToast('🔔 Уведомления включены');
            return true;
        } else {
            console.log('❌ Уведомления запрещены');
            return false;
        }
    }
    return false;
}

function showNativeNotification(title, body, tag) {
    if ('Notification' in window && Notification.permission === 'granted') {
        const options = {
            body: body,
            icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23667eea"/%3E%3Ctext x="50" y="67" text-anchor="middle" fill="white" font-size="40" font-weight="bold"%3E📱%3C/text%3E%3C/svg%3E',
            badge: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23667eea"/%3E%3C/svg%3E',
            vibrate: [200, 100, 200],
            requireInteraction: true,
            tag: tag || 'message'
        };
        
        const notification = new Notification(title, options);
        
        notification.onclick = function() {
            window.focus();
            notification.close();
        };
        
        setTimeout(() => notification.close(), 5000);
    }
}

// ========== ГОЛОСОВЫЕ ==========
async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const audioUrl = await fileToBase64(audioBlob);
            pendingMedia = { type: 'audio', url: audioUrl };
            sendMessage();
            stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        isRecording = true;
        const micBtn = $('micBtn');
        if (micBtn) micBtn.classList.add('recording');
        showToast('🎙️ Запись... Нажмите снова для остановки');
    } catch (err) {
        showToast('❌ Нет доступа к микрофону');
    }
}

function stopRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        const micBtn = $('micBtn');
        if (micBtn) micBtn.classList.remove('recording');
    }
}

function toggleRecording() {
    isRecording ? stopRecording() : startRecording();
}

// ========== ОТПРАВКА СООБЩЕНИЙ ==========
async function sendMessage() {
    const input = $('messageInput');
    const text = input ? input.value.trim() : '';
    if ((!text && !pendingMedia) || !currentChat) return;
    
    const message = { senderId: currentUser.id, senderName: currentUser.name, timestamp: Date.now() };
    if (text) message.text = text;
    if (pendingMedia) {
        message.mediaType = pendingMedia.type;
        message.mediaUrl = pendingMedia.url;
        pendingMedia = null;
    }
    
    await db.ref(`messages/${currentChat}`).push().set(message);
    
    const chatData = state.userChats[currentChat];
    const participants = chatData?.participants || {};
    const lastMsgText = text || (message.mediaType === 'photo' ? '📷 Фото' : message.mediaType === 'video' ? '🎥 Видео' : '🎤 Голосовое');
    
    for (const uid of Object.keys(participants)) {
        if (uid !== currentUser.id) {
            await db.ref(`userChats/${uid}/${currentChat}/unreadCount`).transaction(c => (c || 0) + 1);
            await db.ref(`userChats/${uid}/${currentChat}`).update({ lastMessage: lastMsgText, lastMessageTime: Date.now() });
            
            // ОТПРАВКА УВЕДОМЛЕНИЯ
            showNativeNotification(currentUser.name, lastMsgText, uid);
        }
    }
    await db.ref(`userChats/${currentUser.id}/${currentChat}`).update({ lastMessage: lastMsgText, lastMessageTime: Date.now() });
    await db.ref(`chats/${currentChat}`).update({ lastMessage: lastMsgText, lastMessageTime: Date.now() });
    if (input) input.value = '';
}

// ========== ЧАТЫ ==========
function updateUI() {
    $('userName').innerText = currentUser.name;
    $('userAvatar').innerText = currentUser.avatar;
}

function renderChats() {
    const list = $('chatsList');
    if (!list) return;
    const searchTerm = $('chatSearch')?.value.toLowerCase() || '';
    let chats = Object.entries(state.userChats).map(([id, c]) => ({ id, ...c }));
    chats = chats.filter(c => {
        if (c.type === 'private') {
            const otherId = Object.keys(c.participants || {}).find(id => id !== currentUser.id);
            if (!otherId || !state.users[otherId]) return false;
            const name = state.users[otherId]?.name || otherId;
            return !searchTerm || name.toLowerCase().includes(searchTerm);
        }
        return !searchTerm || (c.name || 'Чат').toLowerCase().includes(searchTerm);
    });
    chats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
    
    list.innerHTML = chats.map(c => {
        let name = c.name || 'Чат', avatar = '?';
        if (c.type === 'private') {
            const otherId = Object.keys(c.participants || {}).find(id => id !== currentUser.id);
            const u = state.users[otherId];
            name = u?.name || otherId;
            avatar = u?.avatar || name[0]?.toUpperCase() || '?';
        } else if (c.type === 'notes') { name = '⭐ Избранное'; avatar = '⭐'; }
        else if (c.type === 'group') avatar = '👥';
        const badge = c.unreadCount ? `<span class="badge">${c.unreadCount}</span>` : '';
        return `<div class="chat-item" data-chat-id="${c.id}"><div class="chat-avatar ${c.type === 'group' ? 'group-avatar' : ''}">${escapeHtml(avatar)}</div><div class="chat-content"><div class="chat-name">${escapeHtml(name)} ${badge}</div><div class="chat-last">${escapeHtml(c.lastMessage || 'Нет сообщений')}</div></div></div>`;
    }).join('');
    document.querySelectorAll('.chat-item').forEach(el => {
        el.onclick = () => openChat(el.dataset.chatId);
    });
}

function loadData() {
    db.ref('users').on('value', s => { state.users = s.val() || {}; renderChats(); });
    db.ref('userChats/' + currentUser.id).on('value', s => { state.userChats = s.val() || {}; renderChats(); });
    db.ref('chats').on('value', s => { state.chats = s.val() || {}; });
}

function openChat(chatId) {
    if (messagesListener && currentChat) db.ref(`messages/${currentChat}`).off('value', messagesListener);
    currentChat = chatId;
    const chat = state.userChats[chatId];
    if (!chat) return;
    
    $('mainArea').classList.add('active');
    let chatName = chat.name || 'Чат';
    
    if (chat.type === 'private') {
        const otherId = Object.keys(chat.participants || {}).find(id => id !== currentUser.id);
        const otherUser = state.users[otherId];
        chatName = otherUser?.name || otherId || 'Пользователь';
        $('chatStatus').innerHTML = otherUser?.status === 'online' ? '<span class="online-dot"></span>В сети' : 'Не в сети';
    } else if (chat.type === 'group') {
        $('chatStatus').innerHTML = `👥 ${Object.keys(chat.participants || {}).length} уч.`;
    } else {
        $('chatStatus').innerHTML = '📝 Заметки';
    }
    $('chatName').innerText = chatName;
    
    messagesListener = db.ref(`messages/${chatId}`).orderByChild('timestamp').on('value', (snap) => {
        const msgs = snap.val() || {};
        const container = $('messagesContainer');
        const arr = Object.entries(msgs).map(([id, m]) => ({ id, ...m })).sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        let html = '';
        for (const m of arr) {
            if (m.deleted && m.senderId !== currentUser.id) {
                html += `<div class="message ${m.senderId === currentUser.id ? 'message-sent' : 'message-received'}"><div class="message-bubble deleted-message"><i class="fas fa-trash"></i> Сообщение удалено<div class="message-time">${formatTime(m.timestamp)}</div></div></div>`;
                continue;
            }
            let media = '';
            if (m.mediaType === 'photo' && m.mediaUrl && !m.deleted) media = `<img src="${m.mediaUrl}" loading="lazy">`;
            else if (m.mediaType === 'video' && m.mediaUrl && !m.deleted) media = `<video src="${m.mediaUrl}" controls></video>`;
            else if (m.mediaType === 'audio' && m.mediaUrl && !m.deleted) media = `<audio controls src="${m.mediaUrl}"></audio>`;
            const sender = state.users[m.senderId];
            const senderName = sender?.name || m.senderId;
            const isSent = m.senderId === currentUser.id;
            html += `<div class="message ${isSent ? 'message-sent' : 'message-received'}" id="msg_${m.id}"><div class="message-bubble">${!isSent ? `<b>${escapeHtml(senderName)}:</b> ` : ''}${m.text && !m.deleted ? escapeHtml(m.text) : ''}${media}<div class="message-time">${formatTime(m.timestamp)}</div>${isSent && !m.deleted ? `<div class="message-menu" data-msg-id="${m.id}"><i class="fas fa-ellipsis-v"></i></div>` : ''}</div></div>`;
        }
        container.innerHTML = html || '<div class="empty-state"><i class="fas fa-comments"></i><p>Начните общение</p></div>';
        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('.message-menu').forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); showMessageMenu(el.dataset.msgId); };
        });
    });
    if (chat.unreadCount) db.ref(`userChats/${currentUser.id}/${chatId}/unreadCount`).set(0);
}

function showMessageMenu(msgId) {
    selectedMessageId = msgId;
    $('messageMenuModal').classList.add('show');
}

async function deleteMessage() {
    if (!selectedMessageId || !currentChat) return;
    await db.ref(`messages/${currentChat}/${selectedMessageId}`).update({ deleted: true, text: '🗑️ Сообщение удалено', mediaType: null, mediaUrl: null });
    $('messageMenuModal').classList.remove('show');
    selectedMessageId = null;
    showToast('✅ Сообщение удалено');
}

// ========== ПОЛЬЗОВАТЕЛИ ==========
function showAllUsers() {
    const grid = $('usersGrid');
    const others = Object.entries(state.users).filter(([id]) => id !== currentUser.id);
    if (others.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:20px">Нет других пользователей</div>';
    } else {
        grid.innerHTML = others.map(([id, u]) => `<div class="user-card" data-user-id="${id}"><div class="user-card-avatar">${escapeHtml(u.avatar || id[0]?.toUpperCase() || '?')}</div><b>${escapeHtml(u.name || id)}</b></div>`).join('');
        document.querySelectorAll('#usersGrid .user-card').forEach(el => {
            el.onclick = () => startChat(el.dataset.userId);
        });
    }
    $('usersModal').classList.add('show');
}

async function startChat(userId) {
    const chatId = [currentUser.id, userId].sort().join('_');
    const exists = await db.ref(`chats/${chatId}`).once('value');
    if (!exists.exists()) {
        const otherUser = state.users[userId];
        await db.ref(`chats/${chatId}`).set({ id: chatId, type: 'private', participants: { [currentUser.id]: true, [userId]: true }, createdAt: Date.now() });
        await db.ref(`userChats/${currentUser.id}/${chatId}`).set({ id: chatId, type: 'private', name: otherUser?.name || userId, participants: { [currentUser.id]: true, [userId]: true } });
        await db.ref(`userChats/${userId}/${chatId}`).set({ id: chatId, type: 'private', name: currentUser.name, participants: { [currentUser.id]: true, [userId]: true } });
    }
    $('usersModal').classList.remove('show');
    openChat(chatId);
}

function showCreateGroup() {
    selectedUsers.clear();
    const grid = $('groupUsersGrid');
    const others = Object.entries(state.users).filter(([id]) => id !== currentUser.id);
    if (others.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:20px">Нет других пользователей</div>';
    } else {
        grid.innerHTML = others.map(([id, u]) => `<div class="user-card" data-user-id="${id}"><div class="user-card-avatar">${escapeHtml(u.avatar || id[0]?.toUpperCase() || '?')}</div><b>${escapeHtml(u.name || id)}</b></div>`).join('');
        document.querySelectorAll('#groupUsersGrid .user-card').forEach(el => {
            el.onclick = () => {
                const uid = el.dataset.userId;
                if (selectedUsers.has(uid)) {
                    selectedUsers.delete(uid);
                    el.style.background = '#f4f7fc';
                    el.style.color = '#000';
                } else {
                    selectedUsers.add(uid);
                    el.style.background = '#667eea';
                    el.style.color = '#fff';
                }
            };
        });
    }
    $('groupModal').classList.add('show');
}

async function createGroup() {
    const name = $('groupName')?.value.trim();
    if (!name || selectedUsers.size === 0) { showToast('❌ Введите название и выберите участников'); return; }
    const groupId = `group_${Date.now()}`;
    const participants = { [currentUser.id]: true };
    selectedUsers.forEach(uid => { participants[uid] = true; });
    await db.ref(`chats/${groupId}`).set({ id: groupId, type: 'group', name, participants, createdAt: Date.now() });
    for (const uid of Object.keys(participants)) {
        await db.ref(`userChats/${uid}/${groupId}`).set({ id: groupId, type: 'group', name, participants });
    }
    $('groupModal').classList.remove('show');
    openChat(groupId);
}

function openProfile() {
    $('profileName').value = currentUser.name;
    $('profileBio').value = currentUser.bio || '';
    $('profilePass').value = '';
    $('profileModal').classList.add('show');
}

async function updateProfile() {
    if ($('profilePass').value !== currentUser.password) { showToast('❌ Неверный пароль'); return; }
    currentUser.name = $('profileName').value || currentUser.name;
    currentUser.bio = $('profileBio').value || '';
    await db.ref('users/' + currentUser.id).update({ name: currentUser.name, bio: currentUser.bio });
    updateUI();
    $('profileModal').classList.remove('show');
    showToast('✅ Профиль обновлён');
}

function leaveChat() {
    if (!currentChat || !confirm('Покинуть чат?')) return;
    db.ref(`userChats/${currentUser.id}/${currentChat}`).remove();
    $('chatMenuModal').classList.remove('show');
    goBack();
    showToast('✅ Вы покинули чат');
}

async function clearChat() {
    if (!currentChat || !confirm('Очистить всю историю чата?')) return;
    const msgs = (await db.ref(`messages/${currentChat}`).once('value')).val() || {};
    for (const msgId of Object.keys(msgs)) {

    }
    $('chatMenuModal').classList.remove('show');
    showToast('✅ История очищена');
}

function initAdmin() {
    const avatarBtn = $('userAvatarBtn');
    if (avatarBtn) {
        avatarBtn.onclick = () => {
            adminClicks++;
            clearTimeout(adminTimer);
            adminTimer = setTimeout(() => { adminClicks = 0; }, 700);
            if (adminClicks >= 3) {
                adminClicks = 0;
                const pass = prompt('🔐 Введите пароль администратора:');
                if (pass === ADMIN_PASS) {
                    $('adminPanel').style.display = 'flex';
                    switchTab('users');
                    showToast('✅ Добро пожаловать в админ-панель');
                } else if (pass !== null) {
                    showToast('❌ Неверный пароль');
                }
            }
        };
    }
}

async function switchTab(tab) {
    const tabs = document.querySelectorAll('#adminTabs .admin-tab');
    tabs.forEach(t => t.classList.remove('active'));
    const activeTab = document.querySelector(`#adminTabs .admin-tab[data-tab="${tab}"]`);
    if (activeTab) activeTab.classList.add('active');
    
    const content = $('adminContent');
    if (!content) return;
    
    if (tab === 'users') {
        let html = `<div class="admin-card"><h4>👥 Управление пользователями (${Object.keys(state.users).length}/${MAX})</h4>`;
        for (const [id, user] of Object.entries(state.users)) {
            html += `<div class="admin-item">
                <div><b>${escapeHtml(id)}</b><br><small style="color:#aaa">${escapeHtml(user.name || id)}</small> ${user.blocked ? '🔒' : '🟢'}</div>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <button class="admin-btn admin-btn-primary" data-action="write" data-user="${id}">💬 Написать</button>
                    <button class="admin-btn admin-btn-warning" data-action="showpass" data-user="${id}">🔑 Пароль</button>
                    <button class="admin-btn admin-btn-warning" data-action="changepass" data-user="${id}">🔄 Сменить пароль</button>
                    <button class="admin-btn ${user.blocked ? 'admin-btn-success' : 'admin-btn-danger'}" data-action="toggle" data-user="${id}">${user.blocked ? 'Разблок' : 'Заблок'}</button>
                    <button class="admin-btn admin-btn-danger" data-action="delete" data-user="${id}">🗑️ Удалить</button>
                </div>
            </div>`;
        }
        content.innerHTML = html + '</div>';
        
        content.querySelectorAll('.admin-btn').forEach(btn => {
            btn.onclick = async () => {
                const userId = btn.dataset.user;
                const action = btn.dataset.action;
                
                if (action === 'write') { closeAdmin(); startChat(userId); }
                else if (action === 'showpass') { const u = (await db.ref(`users/${userId}`).once('value')).val(); alert(`Пароль: ${u?.password}`); }
                else if (action === 'changepass') { const newPass = prompt('Новый пароль:'); if(newPass) { await db.ref(`users/${userId}/password`).set(newPass); showToast(`✅ Пароль ${userId} изменён`); switchTab('users'); } }
                else if (action === 'toggle') { const u = state.users[userId]; const nb = !u?.blocked; await db.ref(`users/${userId}/blocked`).set(nb); if(nb) await db.ref(`forceLogout/${userId}`).set({ time: Date.now() }); showToast(nb ? `🔒 ${userId} заблокирован` : `🔓 ${userId} разблокирован`); switchTab('users'); }
                else if (action === 'delete') { if(confirm(`Удалить ${userId}?`)) { await db.ref(`forceLogout/${userId}`).set({ time: Date.now() }); await db.ref(`users/${userId}`).remove(); showToast(`✅ ${userId} удалён`); switchTab('users'); } }
            };
        });
    }
    else if (tab === 'chats') {
        let html = `<div class="admin-card"><h4>💬 Управление чатами</h4>`;
        for (const [id, chat] of Object.entries(state.chats)) {
            if (chat.type !== 'notes') {
                html += `<div class="admin-item">
                    <div><b>${escapeHtml(chat.name || id)}</b><br><small style="color:#aaa">${chat.type} | ${Object.keys(chat.participants || {}).length} уч.</small></div>
                    <div style="display:flex;gap:6px">
                        <button class="admin-btn admin-btn-primary" data-action="open" data-chat="${id}">📖 Открыть</button>
                        <button class="admin-btn admin-btn-danger" data-action="delete" data-chat="${id}">🗑️ Удалить</button>
                    </div>
                </div>`;
            }
        }
        content.innerHTML = html + '</div>';
        
        content.querySelectorAll('.admin-btn').forEach(btn => {
            btn.onclick = async () => {
                const chatId = btn.dataset.chat;
                const action = btn.dataset.action;
                if (action === 'open') { closeAdmin(); openChat(chatId); }
                else if (action === 'delete') { if(confirm('Удалить чат?')) { await db.ref(`chats/${chatId}`).remove(); await db.ref(`messages/${chatId}`).remove(); for(const uid of Object.keys(state.users)) await db.ref(`userChats/${uid}/${chatId}`).remove(); showToast('✅ Чат удалён'); switchTab('chats'); } }
            };
        });
    }
    else if (tab === 'system') {
        content.innerHTML = `<div class="admin-card"><h4>⚙️ Системные настройки</h4>
            <div class="admin-item"><span>👥 Максимум пользователей: <b>${MAX}</b></span><button class="admin-btn admin-btn-primary" id="setMaxBtn">✏️ Изменить</button></div>
            <div class="admin-item"><span>📢 Отправить уведомление всем</span><button class="admin-btn admin-btn-primary" id="broadcastBtn">📨 Отправить</button></div>
            <div class="admin-item"><span>📊 Показать статистику</span><button class="admin-btn admin-btn-primary" id="statsBtn">📈 Показать</button></div>
        </div>`;
        
        $('setMaxBtn').onclick = async () => { const val = prompt('Максимум пользователей (1-100):', MAX); if(val && val>0 && val<=100) { await db.ref('settings/maxUsers').set(parseInt(val)); MAX=parseInt(val); showToast(`✅ Лимит ${MAX}`); switchTab('system'); } };
        $('broadcastBtn').onclick = async () => { const msg = prompt('Сообщение для всех:'); if(msg) { for(const uid of Object.keys(state.users)) if(uid!==currentUser.id) await db.ref(`notifications/${uid}`).push().set({text:msg,timestamp:Date.now()}); showToast('✅ Отправлено'); } };
        $('statsBtn').onclick = async () => { let total=0; for(const cid of Object.keys(state.chats)) total += Object.keys((await db.ref(`messages/${cid}`).once('value')).val()||{}).length; alert(`📊 Статистика:\n👥 Пользователей: ${Object.keys(state.users).length}\n💬 Сообщений: ${total}\n💬 Чатов: ${Object.keys(state.chats).length}`); };
    }
    else if (tab === 'messages') {
        let html = `<div class="admin-card"><h4>📨 Последние сообщения (50)</h4>`;
        let all = [];
        for (const [cid, chat] of Object.entries(state.chats)) {
            if (chat.type !== 'notes') {
                const msgs = (await db.ref(`messages/${cid}`).orderByChild('timestamp').limitToLast(20).once('value')).val() || {};
                for (const [mid, msg] of Object.entries(msgs)) all.push({ ...msg, id: mid, chatId: cid, chatName: chat.name });
            }
        }
        all.sort((a,b) => (b.timestamp||0)-(a.timestamp||0)).slice(0,50);
        if(!all.length) html += '<p style="text-align:center;padding:20px">Нет сообщений</p>';
        else for(const msg of all) {
            const sender = state.users[msg.senderId];
            const senderName = sender?.name || msg.senderId;
            const msgText = msg.deleted ? '🗑️ Удалено' : (msg.text || (msg.mediaType === 'photo' ? '📷 Фото' : msg.mediaType === 'video' ? '🎥 Видео' : '🎤 Голосовое'));
            html += `<div class="admin-item"><div><b>${escapeHtml(senderName)}</b> → ${escapeHtml(msg.chatName)}<br><small style="color:#aaa">${escapeHtml(msgText)}</small><br><small>${formatTime(msg.timestamp)}</small></div><button class="admin-btn admin-btn-danger" data-action="delete" data-chat="${msg.chatId}" data-msg="${msg.id}">🗑️</button></div>`;
        }
        content.innerHTML = html + '</div>';
        
        content.querySelectorAll('.admin-btn').forEach(btn => {
            btn.onclick = async () => { await db.ref(`messages/${btn.dataset.chat}/${btn.dataset.msg}`).update({ deleted: true, text: '🗑️ Удалено админом' }); showToast('✅ Сообщение удалено'); switchTab('messages'); };
        });
    }
    else if (tab === 'logs') {
        content.innerHTML = `<div class="admin-card"><h4>📋 Логи действий</h4><div id="logsContainer"></div></div>`;
        const logs = (await db.ref('adminLogs').orderByChild('timestamp').limitToLast(50).once('value')).val() || {};
        const container = $('logsContainer');
        if(container) {
            let logHtml = '';
            for(const [id, log] of Object.entries(logs).reverse()) logHtml += `<div class="admin-item"><div><b>${escapeHtml(log.admin)}</b><br><small>${escapeHtml(log.action)}</small><br><small>${new Date(log.timestamp).toLocaleString()}</small></div></div>`;
            container.innerHTML = logHtml || '<p style="text-align:center;padding:20px">Нет логов</p>';
        }
    }
}

// ========== ВХОД ==========
async function doLogin() {
    const name = $('loginName').value.trim();
    const pass = $('loginPassword').value;
    let avatar = $('loginAvatar').value.trim().toUpperCase().slice(0,2) || name.substring(0,2).toUpperCase();
    if(!name || !pass) { showToast('❌ Введите данные'); return; }
    try {
        MAX = (await db.ref('settings/maxUsers').once('value')).val() || 50;
        const usersSnap = await db.ref('users').once('value');
        const users = usersSnap.val() || {};
        const userSnap = await db.ref('users/'+name).once('value');
        if(userSnap.exists()) {
            const u = userSnap.val();
            if(u.password !== pass) { showToast('❌ Неверный пароль'); return; }
            if(u.blocked) { showToast('❌ Аккаунт заблокирован'); return; }
            currentUser = { id: name, name: u.name || name, avatar: u.avatar || avatar, password: pass, bio: u.bio || '', status: 'online' };
        } else {
            if(Object.keys(users).length >= MAX) { showToast(`❌ Лимит ${MAX}`); return; }
            await db.ref('users/'+name).set({ name, avatar, password: pass, createdAt: Date.now(), status: 'online', blocked: false, bio: '' });
            currentUser = { id: name, name, avatar, password: pass, bio: '', status: 'online' };
            const notesId = `notes_${name}`;
            await db.ref(`chats/${notesId}`).set({ id: notesId, type: 'notes', name: '⭐ Избранное', participants: { [name]: true } });
            await db.ref(`userChats/${name}/${notesId}`).set({ id: notesId, type: 'notes', name: '⭐ Избранное' });
        }
        await db.ref('users/'+name).update({ status: 'online' });
        localStorage.setItem('dg_user', JSON.stringify(currentUser));
        $('loginScreen').style.display = 'none';
        $('mainApp').style.display = 'block';
        updateUI();
        loadData();
        initAdmin();
        
        // ЗАПРОС УВЕДОМЛЕНИЙ
        setTimeout(() => { requestNotificationPermission(); }, 2000);
        
        showToast(`✅ Добро пожаловать, ${currentUser.name}!`);
    } catch(e) { showToast('❌ Ошибка: '+e.message); }
}

// ========== ЗАПУСК ==========
document.addEventListener('DOMContentLoaded', () => {
    $('loginBtn').onclick = doLogin;
    $('loginPassword').onkeypress = e => { if(e.key === 'Enter') doLogin(); };
    
    $('showUsersBtn').onclick = showAllUsers;
    $('showGroupBtn').onclick = showCreateGroup;
    $('profileBtn').onclick = openProfile;
    $('logoutBtn').onclick = logout;
    $('backBtn').onclick = goBack;
    $('chatInfoBtn').onclick = showChatInfo;
    $('bgBtn').onclick = () => $('backgroundModal').classList.add('show');
    $('chatMenuBtn').onclick = () => { if(currentChat) $('chatMenuModal').classList.add('show'); };
    $('attachBtn').onclick = () => $('attachMenu').classList.add('show');
    $('micBtn').onclick = toggleRecording;
    $('sendBtn').onclick = sendMessage;
    $('messageInput').onkeypress = e => { if(e.key === 'Enter') sendMessage(); };
    
    $('closeMessageMenu').onclick = () => closeModal('messageMenuModal');
    $('deleteMsgBtn').onclick = deleteMessage;
    $('closeChatMenu').onclick = () => closeModal('chatMenuModal');
    $('leaveChatBtn').onclick = leaveChat;
    $('clearChatBtn').onclick = clearChat;
    $('closeAttach').onclick = () => closeModal('attachMenu');
    $('selectPhotoBtn').onclick = selectPhoto;
    $('selectVideoBtn').onclick = selectVideo;
    $('closeAdminBtn').onclick = closeAdmin;
    $('closeUsersModal').onclick = () => closeModal('usersModal');
    $('closeGroupModal').onclick = () => closeModal('groupModal');
    $('createGroupBtn').onclick = createGroup;
    $('closeProfileModal').onclick = () => closeModal('profileModal');
    $('updateProfileBtn').onclick = updateProfile;
    $('closeBgModal').onclick = () => closeModal('backgroundModal');
    
    document.querySelectorAll('#backgroundModal [data-bg]').forEach(el => {
        el.onclick = () => setBg(el.dataset.bg);
    });
    
    $('photoInput').onchange = async (e) => { if(e.target.files[0]) { pendingMedia = { type: 'photo', url: await fileToBase64(e.target.files[0]) }; sendMessage(); } e.target.value = ''; };
    $('videoInput').onchange = async (e) => { if(e.target.files[0]) { pendingMedia = { type: 'video', url: await fileToBase64(e.target.files[0]) }; sendMessage(); } e.target.value = ''; };
    
    (async () => {
        const settings = await db.ref('settings').once('value');
        if(!settings.exists()) await db.ref('settings').set({ maxUsers: 50 });
        MAX = (await db.ref('settings/maxUsers').once('value')).val() || 50;
        db.ref('users').on('value', s => { const cnt = Object.keys(s.val()||{}).length; if($('userCount')) $('userCount').innerText = `${cnt}/${MAX}`; });
        const saved = localStorage.getItem('dg_user');
        if(saved) {
            try {
                currentUser = JSON.parse(saved);
                $('loginScreen').style.display = 'none';
                $('mainApp').style.display = 'block';
                updateUI();
                loadData();
                initAdmin();
                const savedBg = localStorage.getItem('chatBg');
                if(savedBg && $('messagesContainer')) $('messagesContainer').style.background = savedBg;
                setTimeout(() => { requestNotificationPermission(); }, 2000);
                showToast(`✅ С возвращением, ${currentUser.name}!`);
            } catch(e) { localStorage.clear(); }
        }
    })();
});
</script>
</body>
</html>
